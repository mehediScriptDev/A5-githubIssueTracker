<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="assets/github-logo.png"
      type="image/x-icon"
    />
    <title>A5</title>

    <!-- daisyui + tailwindcss cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesone cdn  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      crossorigin="anonymous"
    />

    <!-- style -->
    <style>
      .font-geist {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="">
    <!-- login page -->
    <section
      class="items-center justify-center min-h-screen hidden container mx-auto px-4"
    >
      <div
        class="card bg-base-100 w-full max-w-lg mx-auto shrink-0 shadow-sm border border-gray-200/40"
      >
        <div class="card-body">
          <div>
            <img class="mx-auto" src="/assets/github-logo.png" alt="" />
            <h1 class="text-center text-2xl font-bold mt-4">
              GitHub Issues Tracker
            </h1>
            <p class="text-[#64748B] text-base text-center">
              Sign in to manage your issues
            </p>
          </div>
          <fieldset class="fieldset">
            <label class="label text-base text-[#1F2937] font-medium"
              >Username</label
            >
            <input
              type="email"
              class="input w-full text-base p-5 border-[#64748B30] rounded-lg"
              placeholder="Enter Username"
            />
            <label class="label text-base text-[#1F2937] font-medium"
              >Password</label
            >
            <input
              type="password"
              class="input w-full p-5 text-base border-[#64748B30] rounded-lg"
              placeholder="Enter Password"
            />
            <button
              class="btn btn-primary mt-4 w-full text-sm lg:text-base py-3 lg:py-5"
            >
              Sign In
            </button>
          </fieldset>
          <div class="divider">OR</div>
          <div class="flex flex-col items-center justify-center">
            <p class="text-[#64748B] text-sm mb-2">Demo Credentials:</p>
            <div class="bg-[#F8FAFC] w-full rounded-lg py-6">
              <p class="text-center">
                <span class="font-medium text-base">Username:</span> admin
              </p>
              <p class="text-center">
                <span class="font-medium text-base">Password:</span> admin123
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- website -->
    <section class="bg-[#F8FAFC]">
      <!-- navbar -->
      <nav class="bg-base-100 shadow">
        <div
          class="navbar container mx-auto px-4 flex-col md:flex-row gap-y-2 items-center"
        >
          <div class="flex-1">
            <a class="btn btn-ghost text-xl">
              <img src="/assets/github-logo.png" class="w-8" alt="" /> GitHub
              Issues Tracker</a
            >
          </div>
          <div class="flex gap-2 items-center w-full md:w-auto">
            <div class="flex-1 min-w-0">
              <input
                type="text"
                placeholder="Search"
                class="input input-bordered w-full"
              />
            </div>
            <div>
              <button class="btn btn-primary flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> New Issue
              </button>
            </div>
          </div>
        </div>
      </nav>

      <!-- main content -->
      <div class="max-w-7xl mx-auto mt-12">
        <!-- tabs -->
        <div class="bg-white rounded-lg flex gap-2 p-6 shadow">
          <button class="btn btn-primary px-8">All</button>
          <button
            class="btn text-[#64748B] border bg-white border-[#E4E4E7] px-6"
          >
            Open
          </button>
          <button
            class="btn text-[#64748B] border bg-white border-[#E4E4E7] px-6"
          >
            Closed
          </button>
        </div>

        <!-- card tables -->
        <div class="mt-4">
          <div class="bg-white rounded-lg shadow flex justify-between items-center p-6">
            <div class="flex gap-2 items-center">
              <div class="bg-[#ECE4FF] p-2 rounded-full">
                <img src="/assets/Aperture.png" alt="table logo" />
              </div>
              <div>
                <h1 class="text-xl font-semibold">50 Issues</h1>
                <p class="text-base text-[#64748B]">
                  Track and manage your project issues
                </p>
              </div>
            </div>
            <div class="flex gap-4">
                <div><span class="inline-block w-3 h-3 bg-[#00A96E] rounded-full mr-1"></span> Open</div>
                <div><span class="inline-block w-3 h-3 bg-[#A855F7] rounded-full mr-1"></span> Closed</div>
            </div>
          </div>
          <div class="bg-[#FBFBFB]">
            
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
